binning:
  mode: pt
  pt_edges:
  - 6
  - 10
  - 15
  - 20
  - 25
  - 35
  pt_labels:
  - '6_10'
  - '10_15'
  - '15_20'
  - '20_25'
  - '25_35'
  vertex_edges:
  - -100.0
  - -30.0
  - 30.0
  - 100.0
  vertex_labels:
  - -100_-30
  - '-30_30'
  - '30_100'
  edges:
  - 6
  - 10
  - 15
  - 20
  - 25
  - 35
  labels:
  - '6_10'
  - '10_15'
  - '15_20'
  - '20_25'
  - '25_35'
data:
  iso_column: recoisoET
  label_column: label
  features:
  - cluster_Et
  - cluster_weta_cogx
  - cluster_wphi_cogx
  - vertexz
  - cluster_Eta
  - e11_over_e33
  - cluster_et1
  - cluster_et2
  - cluster_et3
  - cluster_et4
  per_bin_file_sets:
    '15_25':
      background:
      - shapes_jet20.txt
      signal:
      - shapes_photon10.txt
    '25_35':
      background:
      - shapes_jet30.txt
      signal:
      - shapes_photon20.txt
    '5_15':
      background:
      - shapes_jet15.txt
      signal:
      - shapes_photon5.txt
  pt_column: cluster_Et
  single_file_set:
    background:
    - shapes_nosplit_jet40.txt
    - shapes_nosplit_jet30.txt
    - shapes_nosplit_jet20.txt
    - shapes_nosplit_jet12.txt
    - shapes_nosplit_jet5.txt
    signal:
    - shapes_nosplit_photon20.txt
    - shapes_nosplit_photon10.txt
    - shapes_nosplit_photon5.txt
  use_single_file_set: true
  background_subsampling:
    enabled: true
    et_threshold: 15.0
    flatten_distribution: true
    n_et_bins: 20
    subsample_fraction: 0.3
    random_seed: 42
model:
  classifier: xgb
  params:
    colsample_bylevel: 1.0
    colsample_bytree: 0.6
    grow_policy: lossguide
    learning_rate: 0.1
    max_bin: 256
    max_depth: 5
    n_estimators: 750
    n_jobs: 4
    reg_alpha: 5.0
    reg_lambda: 0.3
    subsample: 0.5
    tree_method: hist
  use_scaler: false
output:
  output_dir: binned_models
  save_metrics: true
  save_models: true
  save_plots: true
  save_tmva: true
  root_file_prefix: model_base_v2E_nosplit
plotting:
  context: talk
  density: true
  figure_size:
  - 7.5
  - 5
  grid: true
  n_bins: 50
  zoom_y_axis: true
reweighting:
  class_reweight: true
  et_reweight: true
  et_reweight_bins: 20
  et_reweight_max: 800.0
  eta_reweight: true
  eta_reweight_bins: 20
  eta_reweight_range:
  - -2.5
  - 2.5
  vertex_reweight: false
  vertex_reweight_bins: 20
  vertex_reweight_max: 50.0
training:
  global_seed: 42
  stratify: true
  train_single_model: true
  train_size: 0.7
  val_size: 0.1
  test_size: 0.2
  enable_hyperparameter_tuning: false
  n_trials: 5
  n_cv_folds: 3
  tuning_timeout_seconds: null
  tuning_data_fraction: 1.0
tuning:
  baseline_auc_threshold: 0.5
  learning_rate_min: 0.001
  learning_rate_max: 0.3
  max_depth_min: 3
  max_depth_max: 10
  n_estimators_min: 100
  n_estimators_max: 1000
  n_estimators_step: 50
  subsample_min: 0.5
  subsample_max: 1.0
  reg_alpha_min: 1.0e-08
  reg_alpha_max: 10.0
  reg_lambda_min: 1.0e-08
  reg_lambda_max: 10.0
  colsample_bytree_min: 0.5
  colsample_bytree_max: 1.0
