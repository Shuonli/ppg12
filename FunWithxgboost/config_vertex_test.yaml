binning:
  # Test vertex binning mode
  mode: vertex  # Options: "pt", "vertex"
  
  # Vertex z binning configuration (used when mode="vertex")
  vertex_edges:
  - -10.0
  - -5.0
  - 0.0
  - 5.0
  - 10.0
  vertex_labels:
  - 'backward'   # -10 to -5 cm
  - 'central'    # -5 to 0 cm
  - 'forward'    # 0 to 5 cm
  - 'far_forward' # 5 to 10 cm
  
  # For backward compatibility
  edges:
  - 6
  - 10
  - 15
  - 20
  - 25
  - 35
  labels:
  - '6_10'
  - '10_15'
  - '15_20'
  - '20_25'
  - '25_35'
data:
  iso_column: recoisoET
  label_column: label
  features:
  - vertexz
  - cluster_Eta
  - e11_over_e33
  - cluster_et1
  - cluster_et2
  - cluster_et3
  - cluster_et4
  per_bin_file_sets:
    '15_25':
      background:
      - shapes_jet20.txt
      signal:
      - shapes_photon10.txt
    '25_35':
      background:
      - shapes_jet30.txt
      signal:
      - shapes_photon20.txt
    '5_15':
      background:
      - shapes_jet15.txt
      signal:
      - shapes_photon5.txt
  pt_column: cluster_Et
  single_file_set:
    background:
    - shapes_jet30.txt
    - shapes_jet20.txt
    - shapes_jet15.txt
    - shapes_jet10.txt
    signal:
    - shapes_photon20.txt
    - shapes_photon10.txt
    - shapes_photon5.txt
  use_single_file_set: true
  # Background subsampling configuration
  background_subsampling:
    enabled: true
    et_threshold: 15.0  # GeV - subsample background samples below this ET
    flatten_distribution: true  # Flatten ET distribution below threshold (vs fixed fraction)
    n_et_bins: 20  # Number of ET bins for flattening (only used if flatten_distribution=true)
    subsample_fraction: 0.3  # Fraction to keep (only used if flatten_distribution=false)
    random_seed: 42  # For reproducibility
model:
  classifier: xgb
  params:
    colsample_bylevel: 1.0
    colsample_bytree: 1.0
    grow_policy: lossguide
    learning_rate: 0.05
    max_bin: 256
    max_depth: 5
    n_estimators: 100  # Reduced for testing
    n_jobs: 4
    reg_alpha: 0.0
    reg_lambda: 1.0
    subsample: 1.0
    tree_method: hist
  use_scaler: false
output:
  output_dir: vertex_binned_models
  save_metrics: true
  save_models: true
  save_plots: true
  save_tmva: true
  root_file_prefix: "vertex_model"  # Prefix for ROOT/TMVA model files
plotting:
  context: talk
  density: true
  figure_size:
  - 7.5
  - 5
  grid: true
  n_bins: 50
reweighting:
  class_reweight: true
  et_reweight: true
  et_reweight_bins: 20
  et_reweight_max: 800.0
  eta_reweight: true
  eta_reweight_bins: 20
  eta_reweight_range:
  - -2.5
  - 2.5
  vertex_reweight: true  # Test vertex reweighting - will show before/after plots
  vertex_reweight_bins: 20
  vertex_reweight_max: 50.0
training:
  global_seed: 42
  stratify: true
  train_single_model: false  # Train per-vertex-bin models
  train_size: 0.8
