site:
  title: "PPG12 Analysis Results"
  subtitle: "Isolated Photon Cross-Section, pp \u221As = 200 GeV \u2014 sPHENIX"
  repo_url: "https://github.com/Shuonli/ppg12"
  pages_url: "https://shuonli.github.io/ppg12"
  # Branch the per-report "View .tex" / "Browse source folder" links point at.
  source_branch: "main"

reports:
  source_dirs:
    - "reports"
    - "reports/direct_vs_frag_truth_iso"
    - "efficiencytool/reports"
    - "plotting/showershape_report"
    - "plotting/selection_report"
    - "plotting/comparison_report"
  include:
    - "*.pdf"
  exclude:
    - "*.aux"
    - "*.log"
    - "*.out"
    - "*.py"
    - "*.toc"
    - "*.C"
    - "main.tex"

figures:
  source_dir: "plotting/figures"
  include:
    - "iso_topo_containment_vs_R.pdf"
    - "iso_topo_dist_data_vs_mc.pdf"
    - "iso_topo_dist_overlay.pdf"
    - "iso_topo_dist_overlay_per_clEt.pdf"
    - "iso_tower_dist_overlay_per_clEt.pdf"
    - "iso_tower_thresh_r03_per_clEt.pdf"
    - "iso_tower_emcal70_per_clEt.pdf"
    - "iso_tower_sub1_per_clEt.pdf"
    - "iso_tower_excl_per_clEt.pdf"
    - "mc_purity_innerR_scan.pdf"
    - "mc_purity_innerR_tower_scan.pdf"
    - "mc_purity_innerR_donut_scan.pdf"
    - "purity_sim_ntbdt_scan.pdf"
    - "purity_closure_ntbdt_scan.pdf"
    - "purity_sim_flat_scan.pdf"
    - "purity_closure_flat_scan.pdf"
    - "purity_sim_bdt_nom.pdf"
    - "purity_sim_bdt_ntbdtmin05.pdf"
    - "purity_sim_bdt_ntbdtmin10.pdf"
    - "purity_sim_bdt_flat_t85_nt50.pdf"
    - "purity_sim_bdt_flat_t90_nt50.pdf"
    - "purity_sim_bdt_flat_t90_nt70.pdf"
    - "purity_sim_bdt_flat_t95_nt50.pdf"
    - "xsec_flat_scan.pdf"
    - "xsec_ratio_flat_scan.pdf"
    - "final_bdt_nom.pdf"
    - "final_bdt_flat_t85_nt50.pdf"
    - "final_bdt_flat_t90_nt50.pdf"
    - "final_bdt_flat_t90_nt70.pdf"
    - "final_bdt_flat_t95_nt50.pdf"
    # Tower-index acceptance maps (from the RecoEff pipeline integration,
    # 2026-04-22). 16 plots: 4 levels (preselect, common, tight, tight_iso)
    # x 4 types (mc, data, ratio, zscore).
    - "official_tower_preselect_mc.pdf"
    - "official_tower_preselect_data.pdf"
    - "official_tower_preselect_ratio.pdf"
    - "official_tower_preselect_zscore.pdf"
    - "official_tower_common_mc.pdf"
    - "official_tower_common_data.pdf"
    - "official_tower_common_ratio.pdf"
    - "official_tower_common_zscore.pdf"
    - "official_tower_tight_mc.pdf"
    - "official_tower_tight_data.pdf"
    - "official_tower_tight_ratio.pdf"
    - "official_tower_tight_zscore.pdf"
    - "official_tower_tight_iso_mc.pdf"
    - "official_tower_tight_iso_data.pdf"
    - "official_tower_tight_iso_ratio.pdf"
    - "official_tower_tight_iso_zscore.pdf"
    # Alt-check methodology plots (rebinning + data-only phi-symmetry)
    - "alt_check_rebin.pdf"
    - "alt_check_phisymm.pdf"
    # Phi-symm mask variants: per-bin ratio + official final plots
    - "phisymm_variant_bybin.pdf"
    - "final_bdt_mask_phisymm_preselect.pdf"
    - "final_bdt_mask_phisymm_common.pdf"
    - "final_bdt_mask_phisymm_tight.pdf"
    - "final_bdt_mask_phisymm_or.pdf"
  max_total_mb: 120

deploy:
  worktree_dir: "_gh-pages-worktree"
  snapshot_dir: "_gh-pages-snapshot"
  branch: "gh-pages"
